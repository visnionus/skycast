<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skycast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f1c;--sb:#0b1525;--card:#14253a;--hero:#122040;
  --hov:#0f1f30;--bdr:#18293d;--bdc:#1e2d42;--bdh:#1e3354;
  --acc:#2d6dc7;--acb:#1d4e8a;--acl:#7ab3e8;--ico:#3d6fa8;
  --tp:#e8f0fa;--ts:#8ba4c0;--tm:#5a7a9a;--td:#4d6a84;--tdd:#3d5a74;
  --wh:#ffffff;--inn:#0f1e30;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tp);display:flex;height:100vh;overflow:hidden}

.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.icon svg,.ic svg{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* SIDEBAR */
.sb{width:210px;min-width:210px;background:var(--sb);border-right:.5px solid var(--bdr);display:flex;flex-direction:column;padding:22px 0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:0 18px 26px}
.logo-i{width:32px;height:32px;background:var(--acb);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--acl);font-size:18px}
.logo-t{font-size:15px;font-weight:500;color:var(--tp)}
.nav-sec{font-size:10px;color:var(--tdd);letter-spacing:1px;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.nav-i{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;color:var(--tm);cursor:pointer;border-right:2px solid transparent;user-select:none;transition:background .15s,color .15s}
.nav-i:hover{color:var(--ts);background:var(--hov)}
.nav-i.act{color:var(--acl);background:var(--hov);border-right-color:var(--acc)}
.nav-i .ic{font-size:17px}
.nav-cit{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 18px;font-size:13px;color:var(--tm);cursor:pointer;border-right:2px solid transparent;transition:background .15s,color .15s}
.nav-cit:hover{color:var(--ts);background:var(--hov)}
.nav-cit.act{color:var(--acl);background:var(--hov);border-right-color:var(--acc)}
.nav-cl{display:flex;align-items:center;gap:10px}
.chev{transition:transform .2s;color:var(--td)}
.chev.op{transform:rotate(180deg)}
.cdd{overflow:hidden;max-height:0;transition:max-height .25s ease}
.cdd.op{max-height:300px}
.copt{padding:8px 18px 8px 44px;font-size:12px;color:var(--td);cursor:pointer;display:flex;justify-content:space-between;transition:color .15s,background .15s}
.copt:hover{color:var(--ts);background:var(--hov)}
.copt.sel{color:var(--acl)}
.ct{color:var(--ico)}
.sb-bot{margin-top:auto;padding:16px 18px 0;border-top:.5px solid var(--bdr)}
.uro{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:50%;background:#1d3a5c;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--acl)}
.un{font-size:12px;color:var(--td)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:var(--sb);border-bottom:.5px solid var(--bdr);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.tb-t{font-size:15px;font-weight:500;color:var(--tp)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-d{font-size:12px;color:var(--td)}
.ibtn{width:32px;height:32px;border-radius:8px;background:var(--card);border:.5px solid var(--bdc);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tm);font-size:16px;transition:background .15s}
.ibtn:hover{background:var(--hov)}

/* PANELS */
.pan{display:none;flex:1;overflow-y:auto;padding:22px;flex-direction:column;gap:18px}
.pan.act{display:flex}
.pan::-webkit-scrollbar{width:5px}
.pan::-webkit-scrollbar-thumb{background:var(--bdc);border-radius:3px}

/* HERO */
.hc{background:var(--hero);border-radius:14px;border:.5px solid var(--bdh);padding:26px 28px;position:relative;overflow:hidden;display:flex;gap:24px;align-items:stretch}
.hbg{position:absolute;right:-10px;top:-10px;font-size:130px;color:#1a3355;line-height:1;pointer-events:none;z-index:0}
.hl{position:relative;z-index:1;display:flex;flex-direction:column;gap:2px;flex:1}
.loc{font-size:11px;color:var(--td);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.cn{font-size:20px;font-weight:500;color:var(--tp);margin-bottom:8px}
.tb{font-size:64px;font-weight:300;color:var(--wh);line-height:1;letter-spacing:-3px}
.tb sup{font-size:26px;font-weight:300;vertical-align:super;letter-spacing:0}
.co{font-size:13px;color:var(--ts);margin-top:6px}
.fe{font-size:11px;color:var(--td);margin-top:2px}
.hr2{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-self:flex-end}
.met{background:rgba(15,30,48,.85);border-radius:10px;border:.5px solid var(--bdc);padding:12px 14px;display:flex;flex-direction:column;gap:4px;min-width:110px}
.met .ic{font-size:18px;color:var(--ico);margin-bottom:2px}
.mv{font-size:16px;font-weight:500;color:var(--tp)}
.ml{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px}

/* HOURLY */
.sl{font-size:11px;color:var(--td);margin-bottom:10px}
.hou{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.hou::-webkit-scrollbar{height:4px}
.hou::-webkit-scrollbar-thumb{background:var(--bdc);border-radius:2px}
.hp{flex-shrink:0;background:var(--card);border-radius:10px;border:.5px solid var(--bdc);padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:72px}
.hp.a{background:var(--acb);border-color:var(--acc)}
.ht{font-size:11px;color:var(--td)}
.hp.a .ht{color:var(--acl)}
.hi{font-size:18px;color:var(--ico)}
.hp.a .hi{color:var(--acl)}
.htt{font-size:13px;font-weight:500;color:var(--tp)}

/* WEEK */
.wg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wc{background:var(--card);border-radius:10px;border:.5px solid var(--bdc);padding:10px 14px;display:flex;align-items:center;gap:10px}
.wd{font-size:12px;color:var(--ts);width:56px;flex-shrink:0}
.wi{font-size:16px;color:var(--ico);flex-shrink:0}
.wdd{font-size:11px;color:var(--td);flex:1}
.wbw{width:50px;height:3px;background:#1a2a3a;border-radius:2px;flex-shrink:0}
.wb{height:100%;border-radius:2px;background:var(--acc)}
.wr{font-size:12px;display:flex;gap:4px;flex-shrink:0}
.wlo{color:var(--td)}
.whi{color:var(--tp);font-weight:500}

/* FORECAST */
.ft{font-size:15px;color:var(--tp);font-weight:400;margin-bottom:4px}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fc{background:var(--card);border-radius:12px;border:.5px solid var(--bdc);padding:18px;display:flex;flex-direction:column;gap:6px}
.fday{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.6px}
.fic{font-size:28px;color:var(--ico);margin:4px 0}
.fds{font-size:12px;color:var(--ts)}
.fte{font-size:36px;font-weight:300;color:var(--wh);letter-spacing:-1px}
.fte sup{font-size:18px;vertical-align:super;font-weight:300}
.frg{font-size:11px;color:var(--td)}
.fdt{display:flex;gap:12px;margin-top:4px}
.fd{font-size:11px;color:var(--td);display:flex;align-items:center;gap:3px}
.fd .ic{font-size:13px;color:var(--ico)}

/* CITIES */
.ctt{font-size:13px;color:var(--td);margin-bottom:10px}
.cl{display:flex;flex-direction:column;gap:8px}
.cc{background:var(--card);border-radius:10px;border:.5px solid var(--bdc);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s,background .15s}
.cc:hover{border-color:var(--acc);background:#162030}
.ci{flex:1}
.cn2{font-size:15px;font-weight:500;color:var(--tp)}
.cc2{font-size:12px;color:var(--td);margin-top:2px}
.cr{display:flex;align-items:center;gap:12px}
.cbg{font-size:11px;background:var(--acb);color:var(--acl);border-radius:20px;padding:3px 10px}
.cci{font-size:22px;color:var(--ico)}
.cte{font-size:22px;font-weight:300;color:var(--wh)}

/* SETTINGS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sb2{background:var(--card);border-radius:12px;border:.5px solid var(--bdc);overflow:hidden}
.sbt{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.8px;padding:14px 18px 10px;border-bottom:.5px solid #1a2a3a}
.sr{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:.5px solid #1a2a3a}
.sr:last-child{border-bottom:none}
.si{font-size:18px;color:var(--ico);flex-shrink:0}
.sif{flex:1}
.sn{font-size:13px;color:var(--tp)}
.ss{font-size:11px;color:var(--td);margin-top:2px}
.sv{font-size:13px;color:var(--ts);flex-shrink:0;font-weight:500}
.tog{width:36px;height:20px;border-radius:10px;background:var(--acb);position:relative;flex-shrink:0;cursor:pointer;transition:background .2s}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:var(--acl);border-radius:50%;top:3px;right:3px;transition:all .2s}
.tog.off{background:#1a2a3a}
.tog.off::after{right:auto;left:3px;background:#3d5a74}

/* API */
.ab{background:var(--hero);border-radius:14px;border:.5px solid var(--bdh);padding:28px;display:flex;flex-direction:column;gap:14px}
.ab h3{font-size:16px;font-weight:500}
.ab p{font-size:13px;color:var(--ts);line-height:1.7}
.ab a,.hint a{color:var(--acl)}
.hint{background:#0d1e30;border-radius:8px;padding:12px 14px;font-size:12px;color:var(--ts);line-height:1.8;border-left:3px solid var(--acc)}
.ir{display:flex;gap:10px}
.ai{flex:1;background:var(--inn);border:.5px solid var(--bdc);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--tp);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.ai:focus{border-color:var(--acc)}
.btn{background:var(--acb);border:none;border-radius:8px;padding:10px 20px;font-size:13px;color:var(--acl);cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;white-space:nowrap}
.btn:hover{background:#245fa8}
.ldr{display:flex;align-items:center;justify-content:center;height:120px;color:var(--td);font-size:13px;gap:8px}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.er{background:#1a0f0f;border:.5px solid #3a1a1a;border-radius:10px;padding:12px 16px;font-size:13px;color:#a05555;display:flex;align-items:center;gap:8px}
.okmsg{font-size:12px;color:var(--acl);display:none;margin-top:4px}
</style>
</head>
<body>

<div class="sb">
  <div class="logo">
    <div class="logo-i"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></div>
    <div class="logo-t">Skycast</div>
  </div>
  <div class="nav-sec">Главное</div>
  <div class="nav-i act" onclick="goPage('dashboard',this)">
    <span class="ic"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    Дашборд
  </div>
  <div class="nav-i" onclick="goPage('forecast',this)">
    <span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    Прогноз
  </div>
  <div class="nav-cit" id="nc" onclick="togCities(this)">
    <div class="nav-cl">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
      Города
    </div>
    <span class="chev" id="chv"><svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2"><polyline points="6 9 12 15 18 9"/></svg></span>
  </div>
  <div class="cdd" id="cdd">
    <div class="copt sel" id="op-Moscow" onclick="pickCity('Moscow','Москва',this)"><span>Москва</span><span class="ct" id="ot-Moscow">—</span></div>
    <div class="copt" id="op-SaintPetersburg" onclick="pickCity('Saint Petersburg','Санкт-Петербург',this)"><span>Санкт-Петербург</span><span class="ct" id="ot-SaintPetersburg">—</span></div>
    <div class="copt" id="op-Sochi" onclick="pickCity('Sochi','Сочи',this)"><span>Сочи</span><span class="ct" id="ot-Sochi">—</span></div>
    <div class="copt" id="op-Kazan" onclick="pickCity('Kazan','Казань',this)"><span>Казань</span><span class="ct" id="ot-Kazan">—</span></div>
    <div class="copt" id="op-Yekaterinburg" onclick="pickCity('Yekaterinburg','Екатеринбург',this)"><span>Екатеринбург</span><span class="ct" id="ot-Yekaterinburg">—</span></div>
  </div>
  <div class="nav-i" onclick="goPage('settings',this)">
    <span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    Настройки
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tb-t" id="pt">Дашборд</div>
    <div class="tb-r">
      <div class="tb-d" id="td2"></div>
      <div class="ibtn" onclick="doRefresh()" title="Обновить">
        <span id="ri"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span>
      </div>
      <div class="ibtn" onclick="goPage('settings',null)">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>
  </div>
  <div class="pan act" id="pan-dashboard"><div id="dbc"><div class="ldr"><span class="spin">↻</span> Загрузка...</div></div></div>
  <div class="pan" id="pan-forecast"><div id="fcc"><div class="ldr"><span class="spin">↻</span> Загрузка...</div></div></div>
  <div class="pan" id="pan-cities"><div id="ctc"><div class="ldr"><span class="spin">↻</span> Загрузка...</div></div></div>
  <div class="pan" id="pan-settings"><div id="stc"></div></div>
</div>

<script>
// ── SVG ICON LIBRARY ──
const S={
  sun:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
  cloud:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
  csun:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M12 2v2M4.93 4.93l1.41 1.41M20 12h2M19.07 4.93l-1.41 1.41"/><path d="M15.5 8.5A5 5 0 1 0 9 18h7.5a4.5 4.5 0 0 0 0-9H16"/></svg>`,
  rain:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>`,
  snow:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
  bolt:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  wind:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>`,
  drop:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
  eye:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  gauge:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10"/><path d="M12 6v6l4 2"/></svg>`,
  pin:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  moon:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  drizzle:`<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><line x1="8" y1="19" x2="8" y2="21"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="16" y1="19" x2="16" y2="21"/><line x1="16" y1="13" x2="16" y2="15"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="12" y1="15" x2="12" y2="17"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>`,
};
const ico=(n,sz)=>`<span style="display:inline-flex;align-items:center;font-size:${sz||16}px;color:var(--ico)">${S[n]||S.cloud}</span>`;
const wico=c=>{const id=parseInt(c);if(id>=200&&id<300)return'bolt';if(id>=300&&id<400)return'drizzle';if(id>=500&&id<600)return'rain';if(id>=600&&id<700)return'snow';if(id>=700&&id<800)return'wind';if(id===800)return'sun';if(id===801||id===802)return'csun';return'cloud';};

// ── STATE ──
let KEY=localStorage.getItem('owm_key')||'';
let CITY=localStorage.getItem('cur_city')||'Moscow';
let CITYR=localStorage.getItem('cur_city_ru')||'Москва';
let page='dashboard',citOpen=false;
const cache={};
const CITIES=[{en:'Moscow',ru:'Москва',id:'Moscow'},{en:'Saint Petersburg',ru:'Санкт-Петербург',id:'SaintPetersburg'},{en:'Sochi',ru:'Сочи',id:'Sochi'},{en:'Kazan',ru:'Казань',id:'Kazan'},{en:'Yekaterinburg',ru:'Екатеринбург',id:'Yekaterinburg'}];
const CM={'clear sky':'Ясно','few clouds':'Малооблачно','scattered clouds':'Переменная облачность','broken clouds':'Облачно','overcast clouds':'Пасмурно','light rain':'Небольшой дождь','moderate rain':'Дождь','heavy intensity rain':'Сильный дождь','light snow':'Небольшой снег','snow':'Снег','mist':'Туман','fog':'Туман','thunderstorm with light rain':'Гроза','thunderstorm':'Гроза','light drizzle':'Морось','drizzle':'Морось'};
const cr=d=>CM[d?.toLowerCase()]||(d?d[0].toUpperCase()+d.slice(1):'—');
const dirs=['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'];
const wdir=d=>dirs[Math.round((d||0)/45)%8];

// Date
const D=new Date(),DN=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'],MN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
document.getElementById('td2').textContent=`${DN[D.getDay()]}, ${D.getDate()} ${MN[D.getMonth()]} ${D.getFullYear()}`;

// ── API FETCH (direct + cors proxy fallback) ──
async function apiFetch(url){
  // Direct request (works when served via http/https)
  try{const r=await fetch(url);if(r.ok){const d=await r.json();if(d.cod==200||d.cod=='200'||d.main)return d;}
  }catch(e){}
  // CORS proxy fallback (for file:// protocol)
  try{const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));if(r.ok){const d=await r.json();if(d.cod==200||d.cod=='200'||d.main)return d;}
  }catch(e){}
  return null;
}
const getW=async c=>{if(cache['w'+c])return cache['w'+c];const d=await apiFetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(c)},RU&appid=${KEY}&units=metric&lang=en`);if(d){cache['w'+c]=d;}return d||null;};
const getF=async c=>{if(cache['f'+c])return cache['f'+c];const d=await apiFetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(c)},RU&appid=${KEY}&units=metric&cnt=56&lang=en`);if(d){cache['f'+c]=d;}return d||null;};

// ── DASHBOARD ──
async function rDB(){
  const el=document.getElementById('dbc');
  if(!KEY){el.innerHTML=apiBx();return;}
  el.innerHTML=ldr();
  const[w,f]=await Promise.all([getW(CITY),getF(CITY)]);
  if(!w){el.innerHTML=err('Не удалось загрузить данные. Проверьте API-ключ в Настройках.');return;}
  const t=Math.round(w.main.temp),fl=Math.round(w.main.feels_like),mn=Math.round(w.main.temp_min),mx=Math.round(w.main.temp_max);
  const desc=cr(w.weather[0].description),wi=wico(w.weather[0].id);
  const hum=w.main.humidity,spd=Math.round(w.wind.speed*3.6),wd=wdir(w.wind.deg),vis=w.visibility?(w.visibility/1000).toFixed(0)+' км':'—',pres=Math.round(w.main.pressure);
  let hou='';
  if(f?.list){const now=Date.now()/1000;f.list.filter(h=>h.dt>=now-1800).slice(0,8).forEach((h,i)=>{const hh=new Date(h.dt*1000).getHours();const lb=i===0?'Сейчас':`${String(hh).padStart(2,'0')}:00`;hou+=`<div class="hp ${i===0?'a':''}"><div class="ht">${lb}</div><span class="hi" style="font-size:18px">${S[wico(h.weather[0].id)]||S.cloud}</span><div class="htt">${Math.round(h.main.temp)}°</div></div>`;});}
  let wk='';
  if(f?.list){const bd={},td=new Date();f.list.forEach(it=>{const d2=new Date(it.dt*1000);const k=`${d2.getFullYear()}-${d2.getMonth()}-${d2.getDate()}`;if(!bd[k])bd[k]={items:[],date:d2};bd[k].items.push(it);});const DN2=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];Object.values(bd).slice(0,6).forEach(day=>{const d3=day.date;const isTd=d3.getDate()===td.getDate()&&d3.getMonth()===td.getMonth();const lb=isTd?'Сегодня':DN2[d3.getDay()];const ts=day.items.map(i=>i.main.temp);const dmn=Math.round(Math.min(...ts)),dmx=Math.round(Math.max(...ts));const mid=day.items[Math.floor(day.items.length/2)];const di=wico(mid.weather[0].id);const dd2=cr(mid.weather[0].description);const bw=Math.min(100,Math.max(20,((dmx+10)/40)*100));wk+=`<div class="wc"><div class="wd">${lb}</div><span class="wi" style="font-size:16px">${S[di]||S.cloud}</span><div class="wdd">${dd2}</div><div class="wbw"><div class="wb" style="width:${bw}%"></div></div><div class="wr"><span class="wlo">${dmn}°</span><span class="whi">${dmx}°</span></div></div>`;});}
  el.innerHTML=`
  <div class="hc">
    <span class="hbg">${S[wi]||S.sun}</span>
    <div class="hl">
      <div class="loc"><span style="font-size:11px">${S.pin}</span> Текущее местоположение</div>
      <div class="cn">${CITYR}, Россия</div>
      <div class="tb">${t}<sup>°</sup></div>
      <div class="co">${desc}</div>
      <div class="fe">Ощущается как ${fl}°</div>
      <div class="fe">Макс. ${mx}° · Мин. ${mn}°</div>
    </div>
    <div class="hr2">
      <div class="met"><span class="ic" style="font-size:18px;color:var(--ico)">${S.drop}</span><div class="mv">${hum}%</div><div class="ml">Влажность</div></div>
      <div class="met"><span class="ic" style="font-size:18px;color:var(--ico)">${S.wind}</span><div class="mv">${spd} км/ч</div><div class="ml">Ветер ${wd}</div></div>
      <div class="met"><span class="ic" style="font-size:18px;color:var(--ico)">${S.eye}</span><div class="mv">${vis}</div><div class="ml">Видимость</div></div>
      <div class="met"><span class="ic" style="font-size:18px;color:var(--ico)">${S.gauge}</span><div class="mv">${pres} гПа</div><div class="ml">Давление</div></div>
    </div>
  </div>
  <div><div class="sl">Сегодня по часам</div><div class="hou">${hou||nd()}</div></div>
  <div><div class="sl">Ближайшие дни</div><div class="wg">${wk||nd()}</div></div>`;
}

// ── FORECAST ──
async function rFC(){
  const el=document.getElementById('fcc');
  if(!KEY){el.innerHTML=apiBx();return;}
  el.innerHTML=ldr();
  const f=await getF(CITY);
  if(!f){el.innerHTML=err('Не удалось загрузить прогноз.');return;}
  const bd={},td=new Date();
  f.list.forEach(it=>{const d2=new Date(it.dt*1000);const k=`${d2.getFullYear()}-${d2.getMonth()}-${d2.getDate()}`;if(!bd[k])bd[k]={items:[],date:d2};bd[k].items.push(it);});
  const DN3=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  let cards='';
  Object.values(bd).slice(0,6).forEach(day=>{
    const d3=day.date,isTd=d3.getDate()===td.getDate()&&d3.getMonth()===td.getMonth();
    const lb=isTd?'СЕГОДНЯ':DN3[d3.getDay()].toUpperCase();
    const ts=day.items.map(i=>i.main.temp),mn=Math.round(Math.min(...ts)),mx=Math.round(Math.max(...ts));
    const rain=day.items.reduce((s,i)=>s+(i.rain?.['3h']||0),0).toFixed(1);
    const spd=Math.round(day.items.reduce((s,i)=>s+i.wind.speed,0)/day.items.length*3.6);
    const mid=day.items[Math.floor(day.items.length/2)],di=wico(mid.weather[0].id),desc=cr(mid.weather[0].description);
    cards+=`<div class="fc"><div class="fday">${lb}</div><span class="fic">${S[di]||S.cloud}</span><div class="fds">${desc}</div><div class="fte">${mx}<sup>°</sup></div><div class="frg">Мин. ${mn}° · Макс. ${mx}°</div><div class="fdt"><div class="fd"><span style="font-size:13px;color:var(--ico)">${S.drop}</span> ${rain} мм</div><div class="fd"><span style="font-size:13px;color:var(--ico)">${S.wind}</span> ${spd} км/ч</div></div></div>`;
  });
  el.innerHTML=`<div class="ft">Прогноз на 6 дней</div><div class="fg">${cards}</div>`;
}

// ── CITIES ──
async function rCT(){
  const el=document.getElementById('ctc');
  if(!KEY){el.innerHTML=apiBx();return;}
  el.innerHTML=ldr();
  const rs=await Promise.all(CITIES.map(c=>getW(c.en)));
  let cards='';
  CITIES.forEach((city,i)=>{
    const w=rs[i],t=w?Math.round(w.main.temp)+'°':'—',d2=w?cr(w.weather[0].description):'—',ci=w?wico(w.weather[0].id):'cloud';
    const badge=city.en===CITY?`<span class="cbg">Текущее</span>`:'';
    const ot=document.getElementById('ot-'+city.id);if(ot&&w)ot.textContent=Math.round(w.main.temp)+'°';
    cards+=`<div class="cc" onclick="pickCity('${city.en}','${city.ru}',null)"><div class="ci"><div class="cn2">${city.ru}</div><div class="cc2">${d2}</div></div><div class="cr">${badge}<span class="cci">${S[ci]||S.cloud}</span><div class="cte">${t}</div></div></div>`;
  });
  el.innerHTML=`<div class="ctt">Все города</div><div class="cl">${cards}</div>`;
}

// ── SETTINGS ──
function rST(){
  document.getElementById('stc').innerHTML=`
  <div class="sg">
    <div class="sb2">
      <div class="sbt">Единицы измерения</div>
      <div class="sr"><span class="si">${S.gauge}</span><div class="sif"><div class="sn">Температура</div><div class="ss">Единица отображения</div></div><div class="sv">C°</div></div>
      <div class="sr"><span class="si">${S.wind}</span><div class="sif"><div class="sn">Скорость ветра</div><div class="ss">Единица отображения</div></div><div class="sv">КМ/Ч</div></div>
      <div class="sr"><span class="si">${S.gauge}</span><div class="sif"><div class="sn">Давление</div><div class="ss">Единица отображения</div></div><div class="sv">гПа</div></div>
      <div class="sr"><span class="si">${S.drop}</span><div class="sif"><div class="sn">Осадки</div><div class="ss">Единица отображения</div></div><div class="sv">ММ</div></div>
    </div>
    <div class="sb2">
      <div class="sbt">Уведомления</div>
      <div class="sr"><span class="si">${S.sun}</span><div class="sif"><div class="sn">Push-уведомления</div><div class="ss">Ежедневный прогноз</div></div><div class="tog" onclick="this.classList.toggle('off')"></div></div>
      <div class="sr"><span class="si">${S.rain}</span><div class="sif"><div class="sn">Оповещение о дожде</div><div class="ss">За 30 минут</div></div><div class="tog" onclick="this.classList.toggle('off')"></div></div>
    </div>
    <div class="sb2">
      <div class="sbt">Интерфейс</div>
      <div class="sr"><span class="si">${S.wind}</span><div class="sif"><div class="sn">Язык</div></div><div class="sv">Русский</div></div>
      <div class="sr"><span class="si">${S.sun}</span><div class="sif"><div class="sn">Формат времени</div></div><div class="sv">24Ч</div></div>
    </div>
    <div class="sb2">
      <div class="sbt">Данные и геолокация</div>
      <div class="sr"><span class="si">${S.pin}</span><div class="sif"><div class="sn">Геолокация</div><div class="ss">Автоопределение города</div></div><div class="tog" onclick="this.classList.toggle('off')"></div></div>
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="sb2" style="max-width:500px">
      <div class="sbt">API-ключ OpenWeatherMap</div>
      <div class="sr" style="flex-direction:column;align-items:flex-start;gap:10px;padding:16px 18px">
        <div class="hint">
          <b>Как получить ключ:</b><br>
          1. Зайдите на <a href="https://openweathermap.org/api" target="_blank">openweathermap.org/api</a><br>
          2. Зарегистрируйтесь (бесплатно) → API keys → скопируйте ключ<br>
          3. Ключ активируется через ~10 мин после регистрации<br>
          4. Если ключ не работает сразу — подождите немного и попробуйте снова
        </div>
        <div class="ir" style="width:100%">
          <input class="ai" id="apiInp" type="text" placeholder="Вставьте API-ключ..." value="${KEY}">
          <button class="btn" onclick="saveKey()">Сохранить</button>
        </div>
        <div id="okmsg" class="okmsg">✓ Ключ сохранён, обновляю данные...</div>
      </div>
    </div>
  </div>`;
}

function saveKey(){
  const v=document.getElementById('apiInp').value.trim();if(!v)return;
  KEY=v;localStorage.setItem('owm_key',v);
  Object.keys(cache).forEach(k=>delete cache[k]);
  const m=document.getElementById('okmsg');m.style.display='block';
  setTimeout(()=>{m.style.display='none';doRefresh();},1500);
}

// ── HELPERS ──
const ldr=()=>`<div class="ldr"><span class="spin">↻</span> Загрузка...</div>`;
const err=m=>`<div class="er">⚠ ${m}</div>`;
const nd=()=>`<div style="color:var(--td);font-size:13px">Нет данных</div>`;
function apiBx(){return`<div class="ab"><h3>Введите API-ключ OpenWeatherMap</h3><p>Для отображения реальных данных нужен бесплатный ключ.</p><div class="hint">1. Зайдите на <a href="https://openweathermap.org/api" target="_blank">openweathermap.org/api</a><br>2. Зарегистрируйтесь → API keys → скопируйте ключ<br>3. Ключ активируется через ~10 минут после регистрации</div><div class="ir"><input class="ai" id="pi" type="text" placeholder="Вставьте ваш API-ключ..."><button class="btn" onclick="savePr()">Подключить</button></div></div>`;}
function savePr(){const v=document.getElementById('pi')?.value?.trim();if(!v)return;KEY=v;localStorage.setItem('owm_key',v);doRefresh();}

// ── NAV ──
function goPage(pg,el){
  page=pg;
  document.querySelectorAll('.nav-i,.nav-cit').forEach(n=>n.classList.remove('act'));
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('act'));
  if(el)el.classList.add('act');
  const titles={dashboard:'Дашборд',forecast:'Прогноз',cities:'Города',settings:'Настройки'};
  document.getElementById('pt').textContent=titles[pg]||'';
  document.getElementById('pan-'+pg).classList.add('act');
  if(pg==='dashboard')rDB();else if(pg==='forecast')rFC();else if(pg==='cities')rCT();else if(pg==='settings')rST();
}
function togCities(el){
  citOpen=!citOpen;
  document.getElementById('cdd').classList.toggle('op',citOpen);
  document.getElementById('chv').classList.toggle('op',citOpen);
  if(citOpen){document.querySelectorAll('.nav-i,.nav-cit').forEach(n=>n.classList.remove('act'));el.classList.add('act');goPage('cities',null);}
}
function pickCity(en,ru,el){
  CITY=en;CITYR=ru;localStorage.setItem('cur_city',en);localStorage.setItem('cur_city_ru',ru);
  delete cache['w'+en];delete cache['f'+en];
  document.querySelectorAll('.copt').forEach(c=>c.classList.remove('sel'));
  const op=document.getElementById('op-'+en.replace(/ /g,''));if(op)op.classList.add('sel');
  if(el)el.classList.add('sel');
  if(page==='dashboard')rDB();else if(page==='forecast')rFC();else if(page==='cities')rCT();
}
async function doRefresh(){
  const ri=document.getElementById('ri');
  ri.style.animation='spin 1s linear infinite';
  Object.keys(cache).forEach(k=>delete cache[k]);
  if(page==='dashboard')await rDB();else if(page==='forecast')await rFC();else if(page==='cities')await rCT();
  ri.style.animation='';
}

// ── INIT ──
rDB();
rST();
</script>
</body>
</html>
